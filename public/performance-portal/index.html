<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Intelligence | Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
  /* CSS Variables */
  :root {
    --slate: #484C6A;
    --slate-dark: #2e3150;
    --pastel-slate: #c2c7cd;
    --pastel-slate-light: #edeaf0;
    --pink: #ff0082;
    --white: #ffffff;
    --black: #1a1a1a;
    --dark-gray: #414141;
    --body-gray: #6b6e85;
    --green: #00D769;
    --amber: #ff5c00;
    --amber-bg: #fff8e1;
    --pink-subtle: #ffe6f2;
    --blue: #3047b0;
    --card-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }



        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Calibri Light', 'Calibri', 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-top: 56px;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--slate); border-radius: 4px; }

        .app-header {
            padding: 40px 40px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .app-header h1 { font-size: 2.2rem; color: var(--color-bg); font-family: 'Calibri', sans-serif; margin-bottom: 5px; }
        .app-header p { color: var(--slate-mid); font-size: 1.05rem; }

        .portal-layout { display: flex; padding: 0 40px 40px; gap: 30px; margin-top: 20px; }

        .tab-sidebar { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
        .tab-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.05);
            padding: 16px 20px; text-align: left; color: var(--pastel-slate); font-size: 1rem;
            font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.02); color: var(--white); }
        .tab-btn.active { background: rgba(255,0,130,0.1); border-color: rgba(255,0,130,0.3); color: var(--pink); }
        .tab-btn.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--pink); }

        .main-content { flex-grow: 1; min-width: 0; }

        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .metric-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 24px; box-shadow: var(--shadow-sm); }
        .metric-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-mid); margin-bottom: 8px; }
        .metric-val { font-size: 2.5rem; font-weight: 700; color: var(--white); line-height: 1.1; }
        .metric-val.pink { color: var(--pink); }
        .metric-val.green { color: var(--green); }
        .delta { font-size: 0.9rem; margin-top: 8px; display: flex; align-items: center; gap: 5px; }
        .delta.pos { color: var(--green); }
        .delta.neg { color: var(--red); }

        .section-header { margin: 0 0 20px 0; font-size: 1.3rem; color: var(--white); display: flex; align-items: center; gap: 10px; }
        .section-header::before { content: ''; width: 20px; height: 3px; background: var(--pink); border-radius: 2px;}

        .table-wrap { overflow-x: auto; background: var(--card-bg); border-radius: 12px; padding: 10px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 12px 20px; color: var(--slate-mid); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.02); color: var(--pastel-slate); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge-red { background: rgba(214,40,40,0.2); color: #d62828; padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }
        .badge-green { background: rgba(27,195,164,0.2); color: #1BC3A4; padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }
        .badge-yellow { background: rgba(233,196,106,0.2); color: #e9c46a; padding: 3px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8rem; }

        .calc-panel { background: var(--card-bg); border-radius: 12px; padding: 30px; margin-bottom: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .control-group { margin-bottom: 24px; }
        .control-label { display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--pastel-slate); margin-bottom: 10px; }
        .val-badge { background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; font-weight: 600; color: var(--white); }
        
        .slider { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); outline: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--pink); cursor: pointer; transition: transform 0.1s; }
        .slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .output-box { border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 20px; background: rgba(0,0,0,0.2); }
        .output-box h4 { margin-bottom: 10px; color: var(--slate-mid); font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }
        .output-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .output-row.highlight { color: var(--pink); font-weight: 700; border: none; font-size: 1.1rem; padding-top: 10px;}

        .chart-box { background: rgba(0,0,0,0.15); border-radius: 8px; padding: 20px; height: 320px; margin-bottom: 24px; }
    </style>
    <link rel="stylesheet" href="/assets/css/design-system.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { 
            LineChart, Line, BarChart, Bar, AreaChart, Area, 
            XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
            ComposedChart, Scatter
        } = window.Recharts;

        const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
        const formatNum = (val) => new Intl.NumberFormat('en-US').format(val);

        // --- Data ---
        const VELOCITY_DATA = [
            { stage: 'MQL→SQL', avgDays: 12, target: 15, deals: 450 },
            { stage: 'SQL→SAL', avgDays: 8, target: 10, deals: 320 },
            { stage: 'SAL→Opp', avgDays: 45, target: 30, deals: 110 },
            { stage: 'Opp→Won', avgDays: 120, target: 90, deals: 18 }
        ];

        const SOURCE_FUNNEL_DATA = [
            { stage: 'MQL', ABM: 420, Events: 150, TIEC: 110, Strategy: 300 },
            { stage: 'SAL', ABM: 320, Events: 95,  TIEC: 85,  Strategy: 180 },
            { stage: 'SQL', ABM: 210, Events: 45,  TIEC: 40,  Strategy: 95 },
            { stage: 'Opp', ABM: 85,  Events: 15,  TIEC: 12,  Strategy: 35 },
            { stage: 'Won', ABM: 22,  Events: 4,   TIEC: 3,   Strategy: 8 }
        ];

        const ENGAGEMENT_DECAY = [
            { acc: 'Wells Fargo', d7: 85, d30: 82, d90: 78, decay: '-8%', alert: '✓', status: 'green' },
            { acc: 'BofA', d7: 72, d30: 68, d90: 45, decay: '-37%', alert: 'RE-ENGAGE', status: 'red' },
            { acc: 'Cigna', d7: 90, d30: 88, d90: 86, decay: '-4%', alert: '✓', status: 'green' },
            { acc: 'Anthem', d7: 42, d30: 31, d90: 12, decay: '-71%', alert: 'AT RISK', status: 'red' }
        ];

        const KEYWORD_HEALTH = [
            { month: 'Oct', healthcare: 0.21, banking: 0.35, insurance: 0.40, retail: 0.35 },
            { month: 'Nov', healthcare: 0.30, banking: 0.38, insurance: 0.38, retail: 0.42 },
            { month: 'Dec', healthcare: 0.28, banking: 0.38, insurance: 0.36, retail: 0.45 },
            { month: 'Jan', healthcare: 0.35, banking: 0.36, insurance: 0.32, retail: 0.48 },
            { month: 'Feb', healthcare: 0.39, banking: 0.37, insurance: 0.30, retail: 0.50 },
            { month: 'Mar', healthcare: 0.42, banking: 0.38, insurance: 0.29, retail: 0.51 }
        ];

        // --- Tabs ---
        const GodMode = () => (
            <div className="fade-in">
                <div className="metric-grid">
                    <div className="metric-card">
                        <div className="metric-title">Pipeline Influenced (S+V)</div>
                        <div className="metric-val">$64.2M</div>
                        <div className="delta pos">↑ $12.1M vs Q4</div>
                    </div>
                    <div className="metric-card">
                        <div className="metric-title">Attributed Won Revenue</div>
                        <div className="metric-val green">$18.5M</div>
                        <div className="delta pos">↑ 22% YoY Tracking</div>
                    </div>
                    <div className="metric-card">
                        <div className="metric-title">Global ROMI</div>
                        <div className="metric-val pink">7.2x</div>
                        <div className="delta pos">↑ Target: 5.0x</div>
                    </div>
                </div>

                <h3 className="section-header">Top 10 Strategic Accounts (Health Matrix)</h3>
                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Account</th>
                                <th>BG Coverage</th>
                                <th>Last Touch</th>
                                <th>Days Idle</th>
                                <th>Stage</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style={{color:'#fff', fontWeight:600}}>Wells Fargo</td>
                                <td>●●●●○ 75%</td>
                                <td>Apr 3</td>
                                <td><span className="badge-green">2d</span></td>
                                <td>SQL</td>
                            </tr>
                            <tr>
                                <td style={{color:'#fff', fontWeight:600}}>Bank of America</td>
                                <td>●●●○○ 60%</td>
                                <td>Mar 28</td>
                                <td><span className="badge-yellow">8d</span></td>
                                <td>SAL</td>
                            </tr>
                            <tr>
                                <td style={{color:'#fff', fontWeight:600}}>Anthem</td>
                                <td><span style={{color: '#d62828'}}>●●○○○ 40%</span></td>
                                <td>Mar 15</td>
                                <td><span className="badge-red">21d</span></td>
                                <td>MQL</td>
                            </tr>
                            <tr>
                                <td style={{color:'#fff', fontWeight:600}}>Cigna</td>
                                <td>●●●●● 90%</td>
                                <td>Apr 4</td>
                                <td><span className="badge-green">1d</span></td>
                                <td>Proposal</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const Calculators = () => {
            const [interactions, setInteractions] = useState(50000);
            const [aht, setAht] = useState(8);
            const [agentCost, setAgentCost] = useState(25);
            const [digitalFteCost, setDigitalFteCost] = useState(15000);

            // Human
            const humanHours = (interactions * aht) / 60;
            const humanCostMonth = humanHours * agentCost;
            const humanAgentsReq = Math.ceil(humanHours / 160); // 160 hrs/mo

            // Digital
            const digitalFteEq = 5; // Fixed assumption based on wireframe logic for simple modelling
            const efficiencyMultiplier = (humanCostMonth / digitalFteCost).toFixed(1);
            const roi = (((humanCostMonth - digitalFteCost) / digitalFteCost) * 100).toFixed(0);
            const breakEven = Math.ceil(digitalFteCost / (((aht/60)*agentCost)));

            return (
                <div className="fade-in">
                    <h3 className="section-header">CX Digital FTE vs Human Agent ROI</h3>
                    <div className="calc-panel">
                        <div>
                            <div className="control-group">
                                <div className="control-label"><span>Monthly Interactions</span> <span className="val-badge">{formatNum(interactions)}</span></div>
                                <input type="range" className="slider" min="5000" max="250000" step="5000" value={interactions} onChange={e => setInteractions(Number(e.target.value))} />
                            </div>
                            <div className="control-group">
                                <div className="control-label"><span>Avg Handle Time (min)</span> <span className="val-badge">{aht} min</span></div>
                                <input type="range" className="slider" min="2" max="30" step="1" value={aht} onChange={e => setAht(Number(e.target.value))} />
                            </div>
                            <div className="control-group">
                                <div className="control-label"><span>Human Agent Cost/hr</span> <span className="val-badge">${agentCost}</span></div>
                                <input type="range" className="slider" min="10" max="60" step="1" value={agentCost} onChange={e => setAgentCost(Number(e.target.value))} />
                            </div>
                            <div className="control-group">
                                <div className="control-label"><span>Digital FTE Cost/mo</span> <span className="val-badge">{formatCurrency(digitalFteCost)}</span></div>
                                <input type="range" className="slider" min="5000" max="50000" step="1000" value={digitalFteCost} onChange={e => setDigitalFteCost(Number(e.target.value))} />
                            </div>
                        </div>

                        <div>
                            <div className="output-box" style={{marginBottom:'15px'}}>
                                <h4>Human Agents</h4>
                                <div className="output-row"><span>Cost/Month:</span> <span style={{color:'#fff'}}>{formatCurrency(humanCostMonth)}</span></div>
                                <div className="output-row" style={{border:0}}><span>FTE Required:</span> <span style={{color:'#fff'}}>{formatNum(humanAgentsReq)} agents</span></div>
                            </div>
                            <div className="output-box" style={{borderColor:'var(--pink)'}}>
                                <h4>CX Digital FTE (Agentic AI)</h4>
                                <div className="output-row"><span>Cost/Month:</span> <span style={{color:'#fff'}}>{formatCurrency(digitalFteCost)}</span></div>
                                <div className="output-row"><span>FTE Equivalent:</span> <span style={{color:'#fff'}}>{digitalFteEq} digital agents</span></div>
                                <div className="output-row highlight" style={{marginTop:'10px'}}><span>Efficiency Multiplier:</span> <span>{efficiencyMultiplier}x</span></div>
                                <div className="output-row highlight"><span>ROI:</span> <span style={{color:'var(--green)'}}>{formatNum(roi)}%</span></div>
                                <div className="output-row highlight"><span>Break-Even Volume:</span> <span style={{color:'#fff'}}>{formatNum(breakEven)} interactions</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VelocityApp = () => (
            <div className="fade-in">
                 <h3 className="section-header">Pipeline Velocity Waterfall</h3>
                 <div className="metric-grid">
                    <div className="metric-card" style={{padding:'15px 20px'}}>
                        <div className="metric-title">Campaign Launch → First Eng.</div>
                        <div className="metric-val" style={{fontSize:'1.8rem'}}>4 Days</div>
                        <div className="delta pos">✓ On Target</div>
                    </div>
                    <div className="metric-card" style={{padding:'15px 20px'}}>
                        <div className="metric-title">First Eng. → MQL</div>
                        <div className="metric-val" style={{fontSize:'1.8rem'}}>18 Days</div>
                        <div className="delta pos">✓ On Target</div>
                    </div>
                    <div className="metric-card" style={{padding:'15px 20px', border:'1px solid var(--red)'}}>
                        <div className="metric-title">MQL → Pipeline (Opp)</div>
                        <div className="metric-val" style={{fontSize:'1.8rem'}}>72 Days</div>
                        <div className="delta neg">Benchmark: 45-60d</div>
                    </div>
                 </div>

                 <div className="chart-box" style={{height:'350px'}}>
                    <ResponsiveContainer width="100%" height="100%">
                        <ComposedChart data={VELOCITY_DATA} layout="vertical" margin={{top: 10, right: 30, left: 30, bottom: 5}}>
                            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" horizontal={true} vertical={false}/>
                            <XAxis type="number" stroke="#848dad" />
                            <YAxis dataKey="stage" type="category" stroke="#848dad" width={80} />
                            <Tooltip contentStyle={{backgroundColor:'#2e3150', border:'none', borderRadius:'8px', color:'#fff'}} cursor={{fill: 'rgba(255,255,255,0.05)'}}/>
                            <Legend />
                            <Bar dataKey="avgDays" name="Actual Days in Stage" fill="#ff0082" barSize={25} radius={[0,4,4,0]} />
                            <Scatter dataKey="target" name="Benchmark Days" fill="#1BC3A4" />
                        </ComposedChart>
                    </ResponsiveContainer>
                 </div>

                 <h3 className="section-header">Campaign Sourcing Funnel (MQL → Won)</h3>
                 <div className="chart-box" style={{height:'350px'}}>
                    <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={SOURCE_FUNNEL_DATA} margin={{top: 20, right: 30, left: 0, bottom: 5}}>
                            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                            <XAxis dataKey="stage" stroke="#848dad" />
                            <YAxis stroke="#848dad" />
                            <Tooltip contentStyle={{backgroundColor:'#2e3150', border:'none', borderRadius:'8px', color:'#fff'}} cursor={{fill: 'rgba(255,255,255,0.05)'}} />
                            <Legend />
                            <Bar dataKey="ABM" stackId="a" fill="#ff0082" radius={[0, 0, 4, 4]} />
                            <Bar dataKey="Strategy" name="Flagship (Strategy)" stackId="a" fill="#3047b0" />
                            <Bar dataKey="Events" stackId="a" fill="#1BC3A4" />
                            <Bar dataKey="TIEC" stackId="a" fill="#e9c46a" radius={[4, 4, 0, 0]} />
                        </BarChart>
                    </ResponsiveContainer>
                 </div>
            </div>
        );

        const IntentApp = () => (
            <div className="fade-in">
                <h3 className="section-header">Demandbase Performance By Vertical (Keyword Health)</h3>
                <div className="chart-box" style={{height:'300px'}}>
                    <ResponsiveContainer width="100%" height="100%">
                        <LineChart data={KEYWORD_HEALTH} margin={{top: 10, right: 10, left: -20, bottom: 0}}>
                            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false} />
                            <XAxis dataKey="month" stroke="#848dad" />
                            <YAxis stroke="#848dad" tickFormatter={(val) => (val * 100).toFixed(0) + '%'} />
                            <Tooltip contentStyle={{backgroundColor:'#2e3150', border:'none', borderRadius:'8px', color:'#fff'}} formatter={(val) => (val * 100).toFixed(1) + '%'} />
                            <Legend />
                            <Line type="monotone" name="Retail CTR" dataKey="retail" stroke="#1BC3A4" strokeWidth={3} dot={{r:4}} />
                            <Line type="monotone" name="Healthcare CTR" dataKey="healthcare" stroke="#3047b0" strokeWidth={3} dot={{r:4}} />
                            <Line type="monotone" name="Banking CTR" dataKey="banking" stroke="#e9c46a" strokeWidth={3} dot={{r:4}} />
                            <Line type="monotone" name="Insurance CTR" dataKey="insurance" stroke="#d62828" strokeWidth={3} strokeDasharray="5 5" dot={{r:4}} />
                        </LineChart>
                    </ResponsiveContainer>
                </div>

                <h3 className="section-header">Engagement Degradation (Time Decay)</h3>
                <div className="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Account</th>
                                <th>7d Score</th>
                                <th>30d Score</th>
                                <th>90d Score</th>
                                <th>Decay Rate</th>
                                <th>Alert</th>
                            </tr>
                        </thead>
                        <tbody>
                            {ENGAGEMENT_DECAY.map(row => (
                                <tr key={row.acc}>
                                    <td style={{color:'#fff', fontWeight:600}}>{row.acc}</td>
                                    <td>{row.d7}</td>
                                    <td>{row.d30}</td>
                                    <td>{row.d90}</td>
                                    <td style={{color: row.status === 'red' ? '#d62828' : '#1BC3A4', fontWeight:700}}>{row.decay}</td>
                                    <td>
                                        <span className={row.status === 'red' ? 'badge-red' : 'badge-green'}>{row.alert}</span>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('godMode');

            return (
                <div className="app-container">
                    <header className="app-header">
                        <h1>Executive Intelligence Tab</h1>
                        <p>High-level C-Board metrics. No "in the weeds" reporting.</p>
                    </header>
                    <div className="portal-layout">
                        <aside className="tab-sidebar">
                            <button className={`tab-btn ${activeTab === 'godMode' ? 'active' : ''}`} onClick={() => setActiveTab('godMode')}>
                                EXEC INTEL (Health)
                            </button>
                            <button className={`tab-btn ${activeTab === 'ai' ? 'active' : ''}`} onClick={() => setActiveTab('ai')}>
                                CX Digital vs Human ROI
                            </button>
                            <button className={`tab-btn ${activeTab === 'velocity' ? 'active' : ''}`} onClick={() => setActiveTab('velocity')}>
                                Pipeline & Sourcing Funnel
                            </button>
                            <button className={`tab-btn ${activeTab === 'intent' ? 'active' : ''}`} onClick={() => setActiveTab('intent')}>
                                Keyword & Decay Analysis
                            </button>
                        </aside>
                        <main className="main-content">
                            {activeTab === 'godMode' && <GodMode />}
                            {activeTab === 'ai' && <Calculators />}
                            {activeTab === 'velocity' && <VelocityApp />}
                            {activeTab === 'intent' && <IntentApp />}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="../assets/js/navigation.js"></script>
    <script src="/assets/js/back-to-top.js"></script>
<script src="../assets/js/dark-mode.js"></script>
</body>
</html>
